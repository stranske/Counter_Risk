name: CI
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  python:
    name: Python CI
    uses: stranske/Workflows/.github/workflows/reusable-10-ci-python.yml@main
    with:
      python-versions: '["3.12"]'
      typecheck: false
      coverage: true
      coverage-min: '80'
      pytest_args: "-n auto --dist loadscope --durations=30"
    secrets: inherit
